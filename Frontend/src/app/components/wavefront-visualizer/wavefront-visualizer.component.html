<div class="bg-slate-900 border border-slate-800 text-white p-6 rounded-3xl shadow-xl flex flex-col justify-between h-full min-h-[460px]">
  <div>
    <!-- Title & Specs Header -->
    <div class="flex items-center justify-between border-b border-slate-800 pb-4 mb-6">
      <div>
        <h3 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
          <span>📊</span> Wavefront Execution Visualizer
        </h3>
        <p class="text-xs text-slate-400 mt-1">Simulating hardware memory alignment and lane scaling</p>
      </div>
      <span class="px-2.5 py-1 bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 text-xs font-mono font-bold rounded-md uppercase tracking-wider">
        64 Lanes (AMD)
      </span>
    </div>

    <!-- Live Architecture Layout Mapping Grid -->
    <div class="space-y-6">

      <!-- Legacy CUDA Warp Map (32 Threads) -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs font-bold tracking-wide text-slate-400 uppercase">Legacy NVIDIA CUDA Warp (32 Threads)</span>
          <span class="text-xs font-mono text-slate-500">Lanes 0-31</span>
        </div>
        <div class="grid grid-cols-8 gap-1.5 bg-slate-950 p-3 rounded-xl border border-slate-800/50">
          <div
            *ngFor="let lane of cudaWarp; let i = index"
            (mouseenter)="hoverLane(i)"
            (mouseleave)="clearHover()"
            [class.bg-indigo-600]="activeLane === i"
            [class.bg-slate-800]="activeLane !== i"
            class="h-6 flex items-center justify-center rounded text-[10px] font-mono font-semibold transition-all duration-150 cursor-crosshair border border-white/5 shadow-inner"
            [title]="'CUDA Thread Lane ' + i">
            {{ i }}
          </div>
        </div>
      </div>

      <!-- Structural Mapping Bridge Vectors -->
      <div class="flex flex-col items-center justify-center py-1 opacity-40">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-400 animate-bounce"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
      </div>

      <!-- Modern Native ROCm Wavefront Map (64 Threads) -->
      <div>
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs font-bold tracking-wide text-emerald-400 uppercase">Native AMD ROCm Wavefront (64 Threads)</span>
          <span class="text-xs font-mono text-slate-500">Lanes 0-63</span>
        </div>
        <div class="grid grid-cols-8 gap-1.5 bg-slate-950 p-3 rounded-xl border border-slate-800/50 relative">
          <div
            *ngFor="let lane of rocmWavefront; let i = index"
            (mouseenter)="hoverLane(i)"
            (mouseleave)="clearHover()"
            [class.bg-emerald-500]="activeLane === i"
            [class.bg-slate-800]="activeLane !== i"
            class="h-6 flex items-center justify-center rounded text-[10px] font-mono font-semibold transition-all duration-150 cursor-crosshair border border-white/5 shadow-inner"
            [title]="'ROCm Wavefront Lane ' + i">
            {{ i }}
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Runtime Architecture Insights Footer -->
  <div class="mt-6 pt-4 border-t border-slate-800/60 flex items-center justify-between text-xs text-slate-400 font-mono">
    <span class="flex items-center gap-2">
      <span class="h-2 w-2 rounded-full bg-emerald-500 inline-block"></span>
      Unrolled Memory Alignment: Optimal
    </span>
    <span class="text-slate-500">Optimizations: {{ bugsResolved }}</span>
  </div>
</div>
