<nav class="bg-[#0f172a] text-slate-300 px-6 py-4 border-b border-slate-800 flex justify-between items-center shadow-lg relative z-50">

  <!-- Left: Branding & Navigation Links -->
  <div class="flex items-center gap-8">

    <!-- Branding -->
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1">
        <span class="text-xl font-black text-white tracking-tight">Gemma<span class="text-indigo-500">Forge</span></span>
      </div>
      <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 uppercase tracking-widest hidden lg:block">
        Enterprise Edition
      </span>
    </div>

    <!-- Navigation Menu (Only visible when logged in) -->
    <div class="hidden md:flex items-center gap-2" *ngIf="authService.isLoggedIn()">
      <a routerLink="/dashboard"
         routerLinkActive="text-white bg-slate-800 border-slate-700 shadow-sm"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-400 border border-transparent hover:text-white hover:bg-slate-800 hover:border-slate-700 transition-all">
        Dashboard
      </a>
      <a routerLink="/rocm-advisor"
         routerLinkActive="text-white bg-slate-800 border-slate-700 shadow-sm"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-400 border border-transparent hover:text-white hover:bg-slate-800 hover:border-slate-700 transition-all">
        🤖 ROCm Advisor
      </a>
      <a routerLink="/wavefront-visualizer"
         routerLinkActive="text-white bg-slate-800 border-slate-700 shadow-sm"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-slate-400 border border-transparent hover:text-white hover:bg-slate-800 hover:border-slate-700 transition-all">
        Wavefront Visualizer
      </a>

      <!-- NEW: PR Approvals Link (Only visible to REVIEWER) -->
      <a *ngIf="currentRole === 'REVIEWER'"
         routerLink="/pr-approvals"
         routerLinkActive="text-white bg-slate-800 border-slate-700 shadow-sm"
         class="px-3 py-1.5 rounded-md text-sm font-medium text-amber-400 border border-transparent hover:text-white hover:bg-slate-800 hover:border-slate-700 transition-all">
        Approve PRs
      </a>
    </div>

  </div>

  <!-- Right: Controls & User -->
  <div class="flex items-center gap-6" *ngIf="authService.isLoggedIn()">

    <!-- Current User Info -->
    <div class="flex items-center gap-3">
      <div class="text-right hidden sm:block">
        <!-- Dynamically display the user's real role -->
        <p class="text-[10px] font-bold uppercase text-slate-500 tracking-wider">{{ authService.getUserRole()|| 'USER' }}</p>
        <p class="text-sm font-bold" [ngClass]="currentRole === 'ADMIN' ? 'text-emerald-400' : 'text-indigo-400'">
          {{ username }}
        </p>
      </div>

      <!-- Safe navigation prevents errors if the user isn't fully loaded yet -->
      <div *ngIf="username" class="h-9 w-9 rounded-full flex items-center justify-center font-bold text-sm"
           [ngClass]="currentRole === 'ADMIN' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-indigo-500/20 text-indigo-400 border border-indigo-500/30'">
        {{ username.charAt(0) | uppercase }}
      </div>
    </div>

    <!-- Logout Button -->
    <div class="border-l border-slate-700 pl-6">
      <button (click)="onLogout()"
              class="px-4 py-1.5 rounded-md text-xs font-bold text-slate-400 bg-slate-800 border border-slate-700 transition-all hover:text-white hover:bg-red-600 hover:border-red-500">
        Logout
      </button>
    </div>

  </div>
</nav>
