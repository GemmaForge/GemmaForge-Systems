
<!-- ======================================================= -->
<!-- ROLE: REVIEWER DASHBOARD (GitHub PR Governance)         -->
<!-- ======================================================= -->
<div *ngIf="currentRole === 'REVIEWER'" class="bg-white rounded-3xl border border-slate-200 shadow-lg p-8 min-h-[460px]">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-2xl font-bold">Migration Approval Queue</h2>
    <span *ngIf="isPushingPR" class="text-sm font-bold text-indigo-600 animate-pulse">Executing GitHub DevOps Pipeline...</span>
  </div>

  <div *ngIf="pendingReports.length === 0" class="text-center py-20 border-2 border-dashed border-slate-200 rounded-2xl">
    <span class="text-4xl mb-4 block">✅</span>
    <h3 class="text-lg font-bold text-slate-700">All caught up!</h3>
    <p class="text-slate-500">No pending migrations require approval.</p>
  </div>

  <div class="space-y-6">
    <div *ngFor="let report of pendingReports" class="border border-slate-200 rounded-2xl p-6 hover:shadow-md transition-all">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="text-xs font-bold uppercase text-indigo-600 tracking-wider">{{ report.project?.projectName }}</p>
          <h3 class="text-xl font-bold text-slate-900 mt-1">{{ report.originalFileName }}</h3>
          <p class="text-sm text-slate-500 mt-2">Est. Savings: <strong class="text-emerald-600">R {{ report.estimatedSavings }}</strong></p>
        </div>
        <div class="flex gap-3">
          <button (click)="rejectReport(report.id)" [disabled]="isPushingPR" class="px-4 py-2 border border-slate-300 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-50 transition-all">Reject</button>
          <button (click)="approveAndPush(report.id)" [disabled]="isPushingPR" class="px-4 py-2 bg-slate-900 text-white rounded-lg text-sm font-bold hover:bg-indigo-600 shadow-lg disabled:opacity-50 transition-all flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            Approve & Push PR
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
