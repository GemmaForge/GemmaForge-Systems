services:
  db:
    image: postgres:15-alpine
    container_name: gemmaforge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: GemmaForgeDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend  # Capitalized to match your actual folder
    container_name: gemmaforge-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/GemmaForgeDB
      - DB_USERNAME=postgres
      - DB_PASSWORD=123456
      - SPRING_AI_OPENAI_BASE_URL=http://134.199.205.43:8000/v1
      - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend # Capitalized to match your actual folder
    container_name: gemmaforge-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data: