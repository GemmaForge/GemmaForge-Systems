spring.application.name=GemmaForge-Enterprise-Backend

# ===================================================================
# 1. SERVER & CLOUD INFRASTRUCTURE
# ===================================================================
server.port=${PORT:8080}
spring.jpa.open-in-view=false

# CORS Configuration
gemmaforge.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}


# ===================================================================
# 2. DATABASE CONFIGURATION (PostgreSQL)
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/GemmaForgeDB}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
# Enable data.sql seeding after Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Safe setting for ongoing development
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true


# ===================================================================
# 3. AI PIPELINE (Gemma 2 via Ollama)
# ===================================================================
spring.ai.ollama.base-url=${OLLAMA_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${AI_MODEL:gemma2:2b}
spring.ai.ollama.chat.options.temperature=0.1


# ===================================================================
# 4. OBSERVABILITY & LOGGING
# ===================================================================
logging.level.root=INFO
logging.level.com.mlm.backend=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.hibernate.SQL=WARN

# ===================================================================
# 5. EXTERNAL API INTEGRATIONS
